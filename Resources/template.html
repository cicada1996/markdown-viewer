<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
:root { color-scheme: light dark; }
* { box-sizing: border-box; }
body {
  font: 16px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  margin: 0;
  color: #1f2328;
  background: #ffffff;
  -webkit-text-size-adjust: 100%;
}
main {
  max-width: 46rem;
  margin: 0 auto;
  padding: 2.5rem 2rem 4rem;
}
h1, h2, h3, h4, h5, h6 { line-height: 1.25; margin: 1.6em 0 0.6em; font-weight: 600; }
h1 { font-size: 2em; padding-bottom: .3em; border-bottom: 1px solid #d1d9e0; margin-top: 0.4em; }
h2 { font-size: 1.5em; padding-bottom: .3em; border-bottom: 1px solid #d1d9e0; }
h3 { font-size: 1.25em; }
a { color: #0969da; text-decoration: none; }
a:hover { text-decoration: underline; }
p, ul, ol, blockquote, table, pre { margin: 0 0 1em; }
li + li { margin-top: .25em; }
code, pre {
  font-family: ui-monospace, "SF Mono", Menlo, monospace;
  font-size: 85%;
  background: rgba(129, 139, 152, 0.16);
  border-radius: 6px;
}
code { padding: .2em .4em; }
pre { padding: 1em; overflow-x: auto; line-height: 1.45; }
pre code { padding: 0; background: none; font-size: 100%; }
blockquote {
  padding: 0 1em;
  color: #59636e;
  border-left: .25em solid #d1d9e0;
  margin-left: 0; margin-right: 0;
}
table { border-collapse: collapse; display: block; overflow-x: auto; }
th, td { border: 1px solid #d1d9e0; padding: 6px 13px; }
th { font-weight: 600; }
tr:nth-child(2n) { background: rgba(129, 139, 152, 0.08); }
img { max-width: 100%; }
hr { border: 0; border-top: 1px solid #d1d9e0; margin: 1.5em 0; }
input[type="checkbox"] { margin-right: .4em; }
li:has(> input[type="checkbox"]) { list-style: none; margin-left: -1.3em; }
@media (prefers-color-scheme: dark) {
  body { color: #e6edf3; background: #1c1f24; }
  h1, h2, hr { border-color: #3d444d; }
  a { color: #4493f8; }
  blockquote { color: #9198a1; border-left-color: #3d444d; }
  th, td { border-color: #3d444d; }
}
</style>

</head>

</html>
